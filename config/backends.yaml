# ─────────────────────────────────────────────────────────────
# LLM Router — backends.yaml
#
# Define your LLM backends here. Each key becomes the backend
# slug used for routing (e.g. [route:fast] or ?backend=fast).
#
# Required fields for every backend:
#   engine  — llama.cpp | vllm | sglang | trt-llm | trt-llm-docker | huggingface | ollama
#   port    — local port this backend listens on
#   model   — path to the model file/directory (llama.cpp/HF)
#             OR a HuggingFace model ID (vllm/sglang)
#
# All ~ paths are expanded to your home directory automatically.
#
# Tip: if you have models in standard locations (~/.lmstudio/models,
#      ~/models, ~/.cache/huggingface/hub), the router will discover
#      them automatically at startup — no manual config needed.
#      Run `python cli.py status` to see what was found.
# ─────────────────────────────────────────────────────────────

backends:

  # ── EXAMPLES — uncomment and edit paths to match your models ─

  # ── Fast tier: small model, quick responses ──────────────────
  # fast:
  #   engine: llama.cpp
  #   port: 8080
  #   model: "~/models/Qwen2.5-7B-Instruct-Q4_K_M.gguf"
  #   ctx_size: 32768
  #   gpu_layers: 999         # 999 = offload all layers to GPU
  #   flash_attn: true
  #   idle_timeout: 300       # stop after 5 min idle
  #   startup_wait: 30        # seconds to wait for health check
  #   tier: fast
  #   description: "Qwen2.5-7B Q4_K_M — fast tier"

  # ── Mid tier: balanced quality and speed ─────────────────────
  # mid:
  #   engine: llama.cpp
  #   port: 8082
  #   model: "~/models/Qwen2.5-32B-Instruct-Q4_K_M.gguf"
  #   ctx_size: 32768
  #   gpu_layers: 999
  #   flash_attn: true
  #   idle_timeout: 180       # stop after 3 min idle
  #   startup_wait: 60
  #   tier: mid
  #   description: "Qwen2.5-32B Q4_K_M — mid tier"

  # ── Deep tier: large reasoning model ─────────────────────────
  # deep:
  #   engine: llama.cpp
  #   port: 8081
  #   model: "~/models/Qwen2.5-72B-Instruct-Q4_K_M.gguf"
  #   ctx_size: 32768
  #   gpu_layers: 999
  #   flash_attn: true
  #   idle_timeout: 600       # stop after 10 min idle
  #   startup_wait: 90        # large model needs more time
  #   tier: deep
  #   description: "Qwen2.5-72B Q4_K_M — deep tier"

  # ── Ollama example (Ollama must already be running) ──────────
  # ollama-llama3:
  #   engine: ollama
  #   port: 11434
  #   model: "llama3.2:latest"
  #   idle_timeout: 300
  #   startup_wait: 30
  #   tier: fast
  #   description: "Llama 3.2 via Ollama"

  # ── vLLM example (needs: pip install vllm) ───────────────────
  # qwen-vllm:
  #   engine: vllm
  #   port: 8091
  #   model: "Qwen/Qwen2.5-72B-Instruct-AWQ"   # HF model ID
  #   ctx_size: 32768
  #   dtype: auto
  #   quantization: awq
  #   gpu_memory_fraction: 0.90
  #   idle_timeout: 600
  #   startup_wait: 120
  #   tier: deep
  #   description: "Qwen2.5-72B AWQ via vLLM"

  # ── SGLang example (needs: pip install sglang) ───────────────
  # llama-sglang:
  #   engine: sglang
  #   port: 8092
  #   model: "meta-llama/Llama-3.1-70B-Instruct"
  #   ctx_size: 32768
  #   gpu_memory_fraction: 0.88
  #   idle_timeout: 600
  #   startup_wait: 120
  #   tier: deep
  #   description: "Llama-3.1-70B via SGLang"

  # ── HuggingFace TGI example ──────────────────────────────────
  # mistral-hf:
  #   engine: huggingface
  #   port: 8093
  #   model: "~/models/Mistral-7B-Instruct-v0.3"
  #   ctx_size: 32768
  #   idle_timeout: 300
  #   startup_wait: 60
  #   tier: fast
  #   description: "Mistral-7B via HF TGI"

  # ── TensorRT-LLM example (local Python runtime, auto-tuned) ──
  # qwen-trt:
  #   engine: trt-llm
  #   port: 8094
  #   model_dir: "~/trt-engines/qwen2-7b"
  #   tokenizer: "~/trt-engines/qwen2-7b/tokenizer"
  #   idle_timeout: 600
  #   startup_wait: 120
  #   tier: mid
  #   description: "Qwen2-7B via TensorRT-LLM (auto-tuned)"
  #   trt_config:
  #     max_batch_size: 1
  #     max_input_len: 32768
  #     max_output_len: 4096
  #     kv_cache_dtype: int8
  #     chunked_context: true

  # ── Managed Docker TensorRT-LLM example ──────────────────────
  # nemotron-trt-docker:
  #   engine: trt-llm-docker
  #   port: 8095
  #   model: "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4"
  #   idle_timeout: 600
  #   startup_wait: 300
  #   tier: fast
  #   description: "Nemotron Nano NVFP4 via managed Docker TRT-LLM"
  #   docker_config:
  #     image: "nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc7"
  #     serve_args:
  #       max_seq_len: 65536
  #       max_num_tokens: 16384
  #       max_batch_size: 4
  #       kv_cache_free_gpu_memory_fraction: 0.75
  #     # Optional escape hatch for custom launch flows:
  #     # launcher_script: "~/start-nemotron-30B-nano-nvfp4.sh"
